<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="r3band" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="r3dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2236"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>
  <!-- Back card left -->
  <rect x="22" y="20" width="48" height="68" rx="6" fill="#0a1628" stroke="#374151" stroke-width="1.5" transform="rotate(-14 50 54)"/>
  <!-- Back card right -->
  <rect x="22" y="20" width="48" height="68" rx="6" fill="#0f1e30" stroke="#4B5563" stroke-width="1.5" transform="rotate(8 50 54)"/>
  <!-- Main card — slightly narrower, more card-like -->
  <rect x="24" y="14" width="52" height="74" rx="8" fill="url(#r3dark)" stroke="#FBBF24" stroke-width="2.5"/>
  <!-- Gold top -->
  <rect x="24" y="14" width="52" height="30" rx="8" fill="url(#r3band)"/>
  <rect x="24" y="32" width="52" height="12" fill="url(#r3band)"/>
  <!-- Corner pips like a real card -->
  <circle cx="31" cy="21" r="2.5" fill="#92400E" opacity="0.5"/>
  <circle cx="69" cy="85" r="2.5" fill="#92400E" opacity="0.5"/>
  <!-- Pokeball centred on lower card -->
  <circle cx="50" cy="57" r="13" fill="#080e1c" stroke="#FBBF24" stroke-width="2.5"/>
  <path d="M37 57 A13 13 0 0 1 63 57 Z" fill="url(#r3band)"/>
  <rect x="37" y="54" width="26" height="6" fill="#080e1c"/>
  <circle cx="50" cy="57" r="5.5" fill="#080e1c" stroke="#FBBF24" stroke-width="2.5"/>
  <circle cx="50" cy="57" r="2.2" fill="#FDE68A"/>
</svg>