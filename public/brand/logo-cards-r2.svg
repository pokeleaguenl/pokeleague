<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="r2band" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="r2card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2a3a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <!-- Back card left — blue tint -->
  <rect x="20" y="22" width="52" height="68" rx="6" fill="#0d1e33" stroke="#2a4060" stroke-width="2" transform="rotate(-13 50 56)"/>
  <!-- Back card right — slightly lighter -->
  <rect x="20" y="22" width="52" height="68" rx="6" fill="#131f30" stroke="#3a5070" stroke-width="2" transform="rotate(7 50 56)"/>
  <!-- Main card body gradient -->
  <rect x="22" y="18" width="56" height="72" rx="7" fill="url(#r2card)" stroke="#FBBF24" stroke-width="2.5"/>
  <!-- Gold gradient band -->
  <rect x="22" y="18" width="56" height="32" rx="7" fill="url(#r2band)"/>
  <rect x="22" y="36" width="56" height="14" fill="url(#r2band)"/>
  <!-- Pokeball -->
  <circle cx="50" cy="55" r="12" fill="#0d111e" stroke="#FBBF24" stroke-width="2.5"/>
  <path d="M38 55 A12 12 0 0 1 62 55 Z" fill="url(#r2band)"/>
  <rect x="38" y="52" width="24" height="6" fill="#0d111e"/>
  <circle cx="50" cy="55" r="5" fill="#0d111e" stroke="#FBBF24" stroke-width="2.5"/>
  <circle cx="50" cy="55" r="2" fill="#FCD34D"/>
</svg>