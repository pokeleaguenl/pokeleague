<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="v3bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#060d18"/>
    </linearGradient>
    <linearGradient id="v3accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <filter id="v3s"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.7"/></filter>
  </defs>
  <!-- Card shadow stack base -->
  <rect x="10" y="28" width="48" height="62" rx="7" fill="#060d18" opacity="0.6"
    transform="rotate(-12 34 59)"/>
  <rect x="42" y="28" width="48" height="62" rx="7" fill="#060d18" opacity="0.6"
    transform="rotate(12 66 59)"/>
  <!-- Left card -->
  <rect x="8" y="20" width="48" height="64" rx="7"
    fill="url(#v3bg)" stroke="#1e3a5f" stroke-width="2"
    transform="rotate(-10 32 52)" filter="url(#v3s)"/>
  <!-- Left card accent stripe -->
  <rect x="8" y="20" width="48" height="18" rx="7"
    fill="#1a3a6e" transform="rotate(-10 32 52)"/>
  <!-- Right card -->
  <rect x="44" y="20" width="48" height="64" rx="7"
    fill="url(#v3bg)" stroke="#1e3a5f" stroke-width="2"
    transform="rotate(10 68 52)" filter="url(#v3s)"/>
  <rect x="44" y="20" width="48" height="18" rx="7"
    fill="#1a3a6e" transform="rotate(10 68 52)"/>
  <!-- Centre hero card -->
  <rect x="26" y="10" width="48" height="68" rx="9"
    fill="#0d1b2a" stroke-width="0" filter="url(#v3s)"/>
  <!-- Glowing border on centre -->
  <rect x="26" y="10" width="48" height="68" rx="9"
    fill="none" stroke="url(#v3accent)" stroke-width="2.5"/>
  <!-- Gold top section -->
  <rect x="26" y="10" width="48" height="26" rx="9" fill="url(#v3accent)" opacity="0.9"/>
  <rect x="26" y="26" width="48" height="10" fill="url(#v3accent)" opacity="0.9"/>
  <!-- Pokeball centre -->
  <circle cx="50" cy="57" r="13" fill="#060d18" stroke-width="0"/>
  <path d="M37 57 A13 13 0 0 1 63 57 Z" fill="url(#v3accent)"/>
  <rect x="37" y="54" width="26" height="6" fill="#060d18"/>
  <circle cx="50" cy="57" r="13" fill="none" stroke="url(#v3accent)" stroke-width="2.5"/>
  <circle cx="50" cy="57" r="5.5" fill="#060d18" stroke="url(#v3accent)" stroke-width="2.5"/>
  <circle cx="50" cy="57" r="2" fill="#FCD34D"/>
</svg>