<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="v3gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDE68A"/><stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="v3card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1f35"/><stop offset="100%" stop-color="#0d111f"/>
    </linearGradient>
  </defs>
  <!-- Back left card peeking -->
  <g transform="rotate(-20 50 55)">
    <rect x="10" y="16" width="42" height="60" rx="7" fill="#0f172a" stroke="#2a3560" stroke-width="1.5"/>
    <rect x="10" y="16" width="42" height="18" rx="7" fill="#1e2d55"/>
    <rect x="10" y="26" width="42" height="8" fill="#1e2d55"/>
  </g>
  <!-- Back right card peeking -->
  <g transform="rotate(20 50 55)">
    <rect x="48" y="16" width="42" height="60" rx="7" fill="#0f172a" stroke="#2a3560" stroke-width="1.5"/>
    <rect x="48" y="16" width="42" height="18" rx="7" fill="#1e2d55"/>
    <rect x="48" y="26" width="42" height="8" fill="#1e2d55"/>
  </g>
  <!-- Hero centre card -->
  <rect x="20" y="8" width="60" height="80" rx="9" fill="url(#v3card)"/>
  <!-- Glowing border -->
  <rect x="20" y="8" width="60" height="80" rx="9" fill="none" stroke="url(#v3gold)" stroke-width="2.5"/>
  <!-- Gold top section -->
  <rect x="20" y="8" width="60" height="30" rx="9" fill="url(#v3gold)"/>
  <rect x="20" y="28" width="60" height="10" fill="url(#v3gold)"/>
  <!-- Pokeball -->
  <circle cx="50" cy="60" r="15" fill="#0a0d1a"/>
  <circle cx="50" cy="60" r="15" fill="none" stroke="url(#v3gold)" stroke-width="2.5"/>
  <path d="M35 60 A15 15 0 0 1 65 60 Z" fill="url(#v3gold)"/>
  <rect x="35" y="57" width="30" height="6" fill="#0a0d1a"/>
  <circle cx="50" cy="60" r="6" fill="#0a0d1a" stroke="url(#v3gold)" stroke-width="2.5"/>
  <circle cx="50" cy="60" r="2.5" fill="#FDE68A"/>
</svg>