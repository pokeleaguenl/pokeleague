<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <clipPath id="oct5">
      <polygon points="30,4 70,4 96,30 96,70 70,96 30,96 4,70 4,30"/>
    </clipPath>
    <linearGradient id="g5top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
  <!-- Octagon bg -->
  <polygon points="30,4 70,4 96,30 96,70 70,96 30,96 4,70 4,30" fill="#111827"/>
  <!-- Top half -->
  <rect x="0" y="0" width="100" height="50" fill="url(#g5top)" clip-path="url(#oct5)"/>
  <!-- Border -->
  <polygon points="30,4 70,4 96,30 96,70 70,96 30,96 4,70 4,30" 
    fill="none" stroke="#FBBF24" stroke-width="3"/>
  <!-- Divider -->
  <line x1="4" y1="50" x2="96" y2="50" stroke="#111827" stroke-width="6"/>
  <!-- Center -->
  <circle cx="50" cy="50" r="12" fill="#111827" stroke="#FBBF24" stroke-width="5"/>
  <circle cx="50" cy="50" r="4" fill="#FBBF24"/>
</svg>