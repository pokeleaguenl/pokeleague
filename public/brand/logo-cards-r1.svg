  </defs>
  <!-- Back card left -->
  <rect x="20" y="22" width="52" height="68" rx="6" fill="#0F172A" stroke="#4B5563" stroke-width="1.5" transform="rotate(-12 50 56)"/>
  <!-- Back card right -->
