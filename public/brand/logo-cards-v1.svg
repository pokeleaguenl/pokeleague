<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="v1gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/><stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>
  <!-- Left card rotated -15deg around centre -->
  <g transform="rotate(-15 50 60)">
    <rect x="14" y="18" width="38" height="54" rx="5" fill="#111f3a" stroke="#2a4070" stroke-width="1.5"/>
    <rect x="14" y="18" width="38" height="16" rx="5" fill="#1e3560"/>
    <rect x="14" y="26" width="38" height="8" fill="#1e3560"/>
  </g>
  <!-- Right card rotated +15deg -->
  <g transform="rotate(15 50 60)">
    <rect x="48" y="18" width="38" height="54" rx="5" fill="#111f3a" stroke="#2a4070" stroke-width="1.5"/>
    <rect x="48" y="18" width="38" height="16" rx="5" fill="#1e3560"/>
    <rect x="48" y="26" width="38" height="8" fill="#1e3560"/>
  </g>
  <!-- Centre card — no rotation, on top -->
  <rect x="27" y="12" width="46" height="66" rx="7" fill="#0f172a" stroke="#FBBF24" stroke-width="2.5"/>
  <rect x="27" y="12" width="46" height="26" rx="7" fill="url(#v1gold)"/>
  <rect x="27" y="28" width="46" height="10" fill="url(#v1gold)"/>
  <!-- Pokeball -->
  <circle cx="50" cy="58" r="13" fill="#0a0f1e" stroke="#FBBF24" stroke-width="2.5"/>
  <path d="M37 58 A13 13 0 0 1 63 58 Z" fill="#FBBF24"/>
  <rect x="37" y="55" width="26" height="6" fill="#0a0f1e"/>
  <circle cx="50" cy="58" r="5" fill="#0a0f1e" stroke="#FBBF24" stroke-width="2.5"/>
  <circle cx="50" cy="58" r="2" fill="#FBBF24"/>
</svg>