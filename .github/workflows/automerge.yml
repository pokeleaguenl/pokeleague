name: Auto-merge labeled PRs

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, ready_for_review]
    branches: [main]
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            let prNumber = context.payload.pull_request?.number;

            if (!prNumber && context.payload.check_suite?.head_sha) {
              const sha = context.payload.check_suite.head_sha;
              const prs = await github.rest.pulls.list({
                owner, repo, state: "open", base: "main", per_page: 50
              });
              const match = prs.data.find(pr => pr.head.sha === sha);
              prNumber = match?.number;
            }

            if (!prNumber) return;

            const pr = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            const labels = pr.data.labels.map(l => l.name);

            if (!labels.includes("automerge")) return;
            if (pr.data.draft) return;

            // only merge when GitHub considers it mergeable
            if (pr.data.mergeable === false) return;

            await github.rest.pulls.merge({
              owner, repo, pull_number: prNumber,
              merge_method: "squash"
            });
